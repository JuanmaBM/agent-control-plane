kind: Policy
name: locked-down
spec:
  version: 1

  filesystem_policy:
    include_workdir: true
    read_only:
      - /usr
      - /lib
      - /opt
      - /proc
      - /dev/urandom
      - /app
      - /runner
      - /etc
      - /var/log
      - /var/run/secrets
    read_write:
      - /sandbox
      - /tmp
      - /dev/null
      - /dev/pts
      - /dev/shm
      - /workspace

  landlock:
    compatibility: best_effort

  process:
    run_as_user: sandbox
    run_as_group: sandbox
