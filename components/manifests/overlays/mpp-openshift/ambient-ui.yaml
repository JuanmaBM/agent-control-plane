apiVersion: v1
kind: ServiceAccount
metadata:
  name: ambient-ui
  namespace: ambient-code--runtime-int
  labels:
    app: ambient-ui
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ambient-ui
  namespace: ambient-code--runtime-int
  labels:
    app: ambient-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ambient-ui
  template:
    metadata:
      labels:
        app: ambient-ui
    spec:
      serviceAccountName: ambient-ui
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ambient-ui
          image: quay.io/ambient_code/acp_ambient_ui:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: API_SERVER_URL
              value: "http://ambient-api-server.ambient-code--runtime-int.svc:8000"
            - name: NODE_ENV
              value: "production"
            - name: SSO_ISSUER_URL
              valueFrom:
                secretKeyRef:
                  name: sso-credentials
                  key: SSO_ISSUER_URL
            - name: SSO_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: sso-credentials
                  key: SSO_CLIENT_ID
            - name: SSO_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: sso-credentials
                  key: SSO_CLIENT_SECRET
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: sso-credentials
                  key: SESSION_SECRET
            - name: NODE_EXTRA_CA_CERTS
              value: "/etc/ssl/service-ca/service-ca.crt"
          volumeMounts:
            - name: next-cache
              mountPath: /app/.next/cache
            - name: tmp
              mountPath: /tmp
            - name: service-ca
              mountPath: /etc/ssl/service-ca
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: next-cache
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        - name: service-ca
          configMap:
            name: openshift-service-ca.crt
            optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: ambient-ui
  namespace: ambient-code--runtime-int
  labels:
    app: ambient-ui
spec:
  selector:
    app: ambient-ui
  ports:
    - port: 3000
      targetPort: http
      protocol: TCP
      name: http
  type: ClusterIP
