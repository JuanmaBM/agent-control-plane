# Source: helm-chart/templates/certgen.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: openshell-gateway-certgen
  namespace: NAMESPACE_PLACEHOLDER
  labels:
    helm.sh/chart: helm-chart-0.0.71
    app.kubernetes.io/name: openshell
    app.kubernetes.io/instance: openshell-gateway
    app.kubernetes.io/version: "0.0.71"
    app.kubernetes.io/managed-by: Helm
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-20"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 120
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openshell
        app.kubernetes.io/instance: openshell-gateway
    spec:
      restartPolicy: OnFailure
      serviceAccountName: openshell-gateway-certgen
      containers:
        - name: certgen
          image: "ghcr.io/nvidia/openshell/gateway:0.0.71"
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          command: ["/usr/local/bin/openshell-gateway"]
          args:
            - generate-certs
            - --server-secret-name=openshell-server-tls
            - --client-secret-name=openshell-client-tls
            - --jwt-secret-name=openshell-gateway-jwt-keys
            - --server-san=openshell-gateway.NAMESPACE_PLACEHOLDER.svc.cluster.local
