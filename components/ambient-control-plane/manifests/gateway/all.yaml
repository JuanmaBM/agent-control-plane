# Source: helm-chart/templates/statefulset.yaml
# SPDX-FileCopyrightText: Copyright (c) 2025-2026 NVIDIA CORPORATION & AFFILIATES. All rights reserved.
# SPDX-License-Identifier: Apache-2.0
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: openshell-gateway
  labels:
    helm.sh/chart: helm-chart-0.0.71
    app.kubernetes.io/name: openshell
    app.kubernetes.io/instance: openshell-gateway
    app.kubernetes.io/version: "0.0.71"
    app.kubernetes.io/managed-by: Helm
spec:
  serviceName: openshell-gateway
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: openshell
      app.kubernetes.io/instance: openshell-gateway
  template:
    metadata:
      annotations:
        # Roll the gateway workload when the rendered gateway TOML changes - the
        # gateway only reads /etc/openshell/gateway.toml at startup, so without
        # this annotation a `helm upgrade` that only mutates the ConfigMap would
        # leave pods running with stale config.
        checksum/gateway-config: 0a9bd5483020121cdf28056b3810a99d5746ca3845ff073c230609b31f2471cf
      labels:
        helm.sh/chart: helm-chart-0.0.71
        app.kubernetes.io/name: openshell
        app.kubernetes.io/instance: openshell-gateway
        app.kubernetes.io/version: "0.0.71"
        app.kubernetes.io/managed-by: Helm
    spec:
      terminationGracePeriodSeconds: 5
      serviceAccountName: openshell-gateway
      securityContext:
        fsGroup: 1000
      containers:
        - name: openshell-gateway
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            runAsNonRoot: true
            runAsUser: 1000
          image: "ghcr.io/nvidia/openshell/gateway:0.0.71"
          imagePullPolicy: IfNotPresent
          args:
            - --config
            - /etc/openshell/gateway.toml
            - --db-url
            - "sqlite:/var/openshell/openshell.db"
          env:
            # All gateway settings live in the ConfigMap-backed TOML file
            # mounted at /etc/openshell/gateway.toml. The only env var below
            # is a process-level setting consumed by libraries outside
            # gateway code (currently just SSL_CERT_FILE for OIDC issuer TLS).
          volumeMounts:
            - name: openshell-data
              mountPath: /var/openshell
            - name: gateway-config
              mountPath: /etc/openshell
              readOnly: true
            - name: sandbox-jwt
              mountPath: /etc/openshell-jwt
              readOnly: true
            - name: tls-cert
              mountPath: /etc/openshell-tls/server
              readOnly: true
            - name: tls-client-ca
              mountPath: /etc/openshell-tls/client-ca
              readOnly: true
          ports:
            - name: grpc
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          startupProbe:
            httpGet:
              path: /healthz
              port: health
            periodSeconds: 2
            timeoutSeconds: 1
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 1
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 1
            periodSeconds: 2
            timeoutSeconds: 1
            failureThreshold: 3
          resources:
            {}
      volumes:
        - name: gateway-config
          configMap:
            name: openshell-gateway-config
        - name: sandbox-jwt
          secret:
            secretName: openshell-gateway-jwt-keys
            defaultMode: 256
        - name: tls-cert
          secret:
            secretName: openshell-server-tls
        - name: tls-client-ca
          secret:
            secretName: openshell-server-tls
            items:
              - key: ca.crt
                path: ca.crt
  volumeClaimTemplates:
    - metadata:
        name: openshell-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
