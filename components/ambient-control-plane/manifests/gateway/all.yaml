apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: openshell-gateway-sandbox
  namespace: NAMESPACE_PLACEHOLDER
  labels:
    helm.sh/chart: helm-chart-0.0.71
    app.kubernetes.io/name: openshell
    app.kubernetes.io/instance: openshell-gateway
    app.kubernetes.io/version: "0.0.71"
    app.kubernetes.io/managed-by: Helm
rules:
  - apiGroups:
      - agents.x-k8s.io
    resources:
      - sandboxes
      - sandboxes/status
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - get
      - list
      - watch
  # Per-sandbox identity: TokenReview authenticates the projected token from
  # the configured sandbox service account, then the gateway resolves the
  # returned pod name and UID to the pod's `openshell.io/sandbox-id`
  # annotation. patch is intentionally NOT granted — the annotation is set
  # once at pod create and must remain immutable for the lifetime of the
  # sandbox.
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
