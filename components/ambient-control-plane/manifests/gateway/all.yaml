# Source: helm-chart/templates/gateway-config.yaml
# SPDX-FileCopyrightText: Copyright (c) 2025-2026 NVIDIA CORPORATION & AFFILIATES. All rights reserved.
# SPDX-License-Identifier: Apache-2.0

apiVersion: v1
kind: ConfigMap
metadata:
  name: openshell-gateway-config
  labels:
    helm.sh/chart: helm-chart-0.0.71
    app.kubernetes.io/name: openshell
    app.kubernetes.io/instance: openshell-gateway
    app.kubernetes.io/version: "0.0.71"
    app.kubernetes.io/managed-by: Helm
data:
  gateway.toml: |
    [openshell]
    version = 1

    [openshell.gateway]
    bind_address          = "0.0.0.0:8080"
    health_bind_address   = "0.0.0.0:8081"
    metrics_bind_address  = "0.0.0.0:9090"
    log_level             = "info"
    sandbox_namespace     = "NAMESPACE_PLACEHOLDER"
    default_image         = "ghcr.io/nvidia/openshell-community/sandboxes/base:latest"
    supervisor_image      = "ghcr.io/nvidia/openshell/supervisor:0.0.71"
    client_tls_secret_name = "openshell-client-tls"
    enable_loopback_service_http = true
    server_sans = ["openshell-gateway.NAMESPACE_PLACEHOLDER.svc.cluster.local"]

    [openshell.gateway.tls]
    cert_path             = "/etc/openshell-tls/server/tls.crt"
    key_path              = "/etc/openshell-tls/server/tls.key"
    client_ca_path        = "/etc/openshell-tls/client-ca/ca.crt"

    [openshell.gateway.gateway_jwt]
    signing_key_path = "/etc/openshell-jwt/signing.pem"
    public_key_path  = "/etc/openshell-jwt/public.pem"
    kid_path         = "/etc/openshell-jwt/kid"
    gateway_id       = "openshell-gateway"
    ttl_secs         = 3600

    [openshell.drivers.kubernetes]
    grpc_endpoint                = "https://openshell-gateway.NAMESPACE_PLACEHOLDER.svc.cluster.local:8080"
    service_account_name         = "openshell-gateway-sandbox"
    supervisor_sideload_method   = "init-container"
    sa_token_ttl_secs            = 3600
    app_armor_profile            = "Unconfined"
